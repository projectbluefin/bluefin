# Package manifest for the bluefin base image.
# Read by build_files/base/03-packages.sh via build_files/shared/read-packages.
#
# Sections:
#   [multimedia_overrides]   packages synced from fedora-multimedia repo
#   [fedora]                 base Fedora packages, all versions
#   [fedora_v42]             additions for Fedora 42 only
#   [fedora_v43]             additions for Fedora 43 only
#   [fedora_v44]             additions for Fedora 44 only
#   [excluded]               packages removed from the base image

[multimedia_overrides]
# Replace mesa and friends with less-crippled versions from negativo17/fedora-multimedia.
# Versions are pinned with `dnf5 versionlock` after install.
packages = [
    "intel-gmmlib",
    "intel-mediasdk",
    "intel-vpl-gpu-rt",
    "libheif",
    "libva",
    "libva-intel-media-driver",
    "mesa-dri-drivers",
    "mesa-filesystem",
    "mesa-libEGL",
    "mesa-libGL",
    "mesa-libgbm",
    "mesa-vulkan-drivers",
]

[fedora]
# Base packages from Fedora repos — common to all supported Fedora versions.
packages = [
    "adw-gtk3-theme",
    "adwaita-fonts-all",
    "alsa-firmware",
    "alsa-tools-firmware",
    "anaconda-live",
    "bootc",
    "containerd",
    "ddcutil",
    "distrobox",
    "dracut-live",
    "evtest",
    "fastfetch",
    "firewall-config",
    "fish",
    "flatpak-spawn",
    "firefox",
    "gcc",
    "gcc-c++",
    "git-credential-libsecret",
    "gnome-ponytail-daemon",
    "gnome-tweaks",
    "google-noto-sans-cjk-vf-fonts",
    "grub2-efi-x64-cdboot",
    "gum",
    "gvfs-nfs",
    "ibus-mozc",
    "ibus-unikey",
    "igt-gpu-tools",
    "input-remapper",
    "isomd5sum",
    "just",
    "libappindicator-gtk3",
    "libayatana-appindicator-gtk3",
    "libblockdev-btrfs",
    "libblockdev-dm",
    "libblockdev-lvm",
    "libblockdev-mpath",
    "libcamera-gstreamer",
    "libcamera-tools",
    "libratbag-ratbagd",
    "libva-utils",
    "libxcrypt-compat",
    "livesys-scripts",
    "make",
    "mesa-libGLU",
    "mozc",
    "nautilus-gsconnect",
    "openrgb-udev-rules",
    "openssh-askpass",
    "pipewire-libs-extra",
    "python3-gnome-ponytail-daemon",
    "slitherer",
    "squashfs-tools",
    "switcheroo-control",
    "waypipe",
    "wireguard-tools",
    "wl-clipboard",
    "xdg-terminal-exec",
    "xorriso",
    "zenity",
    "zsh",
]

[fedora_v42]
# TODO: remove when F42 is dropped
packages = [
    "evolution-ews-core",
]

[fedora_v43]
packages = [
    "evolution-ews-core",
    "gnupg2-scdaemon",
]

[fedora_v44]
packages = [
    "gnupg2-scdaemon",
]

[excluded]
# Packages removed from the base image — conflicts with or replaced by image content.
packages = [
    "default-fonts-cjk-sans",
    "fedora-bookmarks",
    "fedora-chromium-config",
    "fedora-chromium-config-gnome",
    "fedora-third-party",
    "firefox-langpacks",
    "gnome-extensions-app",
    "gnome-shell-extension-background-logo",
    "gnome-software",
    "gnome-software-rpm-ostree",
    "gnome-terminal-nautilus",
    "google-noto-sans-cjk-fonts",
    "podman-docker",
    "totem-video-thumbnailer",
    "yelp",
]
