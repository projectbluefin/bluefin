    verify: "python3 - <<'PY'\nfrom pathlib import Path\nfor p in Path('.').rglob('*.md'):\n    if any(part in {'.git','.worktrees','.pytest_cache','specs'} for part in p.parts): continue\n    for line in p.read_text(errors='ignore').splitlines():\n        if '](' in line and 'http' not in line:\n            target=line.split('](',1)[1].split(')',1)[0].split('#',1)[0]\n            if target and not target.startswith('<') and not (p.parent / target).exists() and not (Path('.') / target).exists():\n                raise SystemExit(f'broken link: {p}: {target}')\nprint('links ok')\nPY"
