    verify: "python3 - <<'PY'\nfrom pathlib import Path\nfor p in Path('docs/skills').glob('*/SKILL.md'):\n    text = p.read_text()\n    assert text.startswith('---\\n') and '\\nname:' in text and '\\ndescription:' in text\nprint('metadata ok')\nPY"
    status: passing
