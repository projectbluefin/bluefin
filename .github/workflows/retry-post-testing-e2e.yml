name: Retry Post-Testing E2E

on:
  workflow_run:
    workflows: ["Post-Testing E2E"]
    types: [completed]

permissions:
  contents: read
  actions: write

jobs:
  retry-bootstrap-failure:
    name: Retry Post-Testing E2E on transient bootstrap failure
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Inspect failed workflow logs for known bootstrap failures
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          tmp_log="$(mktemp)"
          if ! gh run view "$RUN_ID" --repo "$REPO" --log-failed > "$tmp_log" 2>/dev/null; then
            echo "Unable to fetch failed logs for run $RUN_ID; skipping retry."
            exit 0
          fi

          if ! grep -Eiq 'SSH never became ready|bootupd is required|ostree deployment missing|vmlinuz not found|No boot\\.N symlink|bootc install exited|timed out after 15 minutes' "$tmp_log"; then
            echo "No known transient bootstrap failure pattern found; skipping retry."
            exit 0
          fi

          echo "Detected known transient bootstrap failure pattern; rerunning failed jobs."
          gh run rerun "$RUN_ID" --repo "$REPO" --failed-only
