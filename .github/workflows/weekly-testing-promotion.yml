name: Weekly Testing Promotion

on:
  schedule:
    - cron: '0 6 * * 2' # Tuesday 06:00 UTC (08:00 EEST)
  workflow_dispatch:

concurrency:
  group: weekly-testing-promotion
  cancel-in-progress: false

permissions: {}

jobs:
  # Enforce a minimum 7-day floor between stable promotions to prevent churn.
  # On workflow_dispatch the floor is bypassed so maintainers can force a
  # promotion (e.g. after a hotfix or a failed previous run).
  check-promotion-floor:
    name: Check 7-day promotion floor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_promote: ${{ steps.floor.outputs.should_promote }}
    steps:
      - name: Check days since last stable release
        id: floor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch — bypassing promotion floor."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_RELEASE=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty')

          if [[ -z "$LAST_RELEASE" ]]; then
            echo "No previous release found — first promotion, proceeding."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TS=$(date -d "$LAST_RELEASE" +%s)
          NOW_TS=$(date +%s)
          DAYS_SINCE=$(( (NOW_TS - LAST_TS) / 86400 ))

          echo "Last stable release: $LAST_RELEASE (${DAYS_SINCE} days ago)"

          if [[ "$DAYS_SINCE" -lt 7 ]]; then
            echo "Floor not met (${DAYS_SINCE}/7 days) — skipping promotion this cycle."
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
          else
            echo "Floor met (${DAYS_SINCE} days) — proceeding with promotion."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
          fi

  # Verify that post-testing-e2e.yml already ran smoke tests on the current
  # main HEAD since every push to main triggers it. If e2e hasn't passed
  # on the current HEAD (e.g., a new push just landed), fail fast rather than
  # promoting untested code.
  verify-e2e:
    needs: [check-promotion-floor]
    if: needs.check-promotion-floor.outputs.should_promote == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    outputs:
      testing_sha: ${{ steps.lock-sha.outputs.sha }}
      build_run_id: ${{ steps.find-build.outputs.run_id }}
      image: ${{ steps.get-digest.outputs.image }}
      nvidia_image: ${{ steps.get-nvidia-digest.outputs.image }}
    steps:
      - name: Lock main HEAD SHA
        id: lock-sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Locked main SHA: $SHA"

      - name: Find passing post-testing-e2e run for this SHA
        id: find-e2e
        env:
          GH_TOKEN: ${{ github.token }}
          LOCKED_SHA: ${{ steps.lock-sha.outputs.sha }}
        run: |
          set -euo pipefail

          # Look for a successful post-testing-e2e run on the locked SHA.
          # post-testing-e2e.yml fires via workflow_run — its head_sha matches
          # the main push SHA that triggered it.
          E2E_STATUS=$(gh run list \
            --workflow post-testing-e2e.yml \
            --branch main \
            --repo "${{ github.repository }}" \
            --limit 50 \
            --json headSha,conclusion \
            --jq ".[] | select(.headSha == \"$LOCKED_SHA\") | .conclusion" \
            | head -1)

          echo "E2E status for $LOCKED_SHA: ${E2E_STATUS:-not found}"

          if [ "$E2E_STATUS" != "success" ]; then
            # TODO(#405): remove this bypass once post-testing-e2e reliably
            # passes on every push-triggered Testing Images build.
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "::warning::No successful post-testing-e2e found for $LOCKED_SHA."
              echo "::warning::Bypassing gate — manual dispatch by maintainer."
              echo "::warning::Ensure smoke+common suites passed before promoting."
            else
              echo "ERROR: post-testing-e2e has not passed on main HEAD ($LOCKED_SHA)."
              echo "  Status: ${E2E_STATUS:-no run found}"
              echo "  Either e2e is still running, failed, or main just advanced."
              echo "  Rerun this workflow once post-testing-e2e passes."
              exit 1
            fi
          else
            echo "✅ post-testing-e2e passed on main HEAD"
          fi

      - name: Find the build run for this SHA
        id: find-build
        env:
          GH_TOKEN: ${{ github.token }}
          LOCKED_SHA: ${{ steps.lock-sha.outputs.sha }}
        run: |
          set -euo pipefail

          RUN_ID=$(gh run list \
            --workflow build-image-testing.yml \
            --branch main \
            --repo "${{ github.repository }}" \
            --limit 50 \
            --json databaseId,headSha,conclusion \
            --jq ".[] | select(.headSha == \"$LOCKED_SHA\" and .conclusion == \"success\") | .databaseId" \
            | head -1)

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: No successful build run found for SHA $LOCKED_SHA"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Found build run $RUN_ID for SHA $LOCKED_SHA"

      - name: Download build digest
        id: get-digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DIGEST_DIR="$RUNNER_TEMP/digest-main"
          rm -rf "$DIGEST_DIR"
          mkdir -p "$DIGEST_DIR"
          gh run download "${{ steps.find-build.outputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --name "image-digest-testing-bluefin-main-x86_64" \
            --dir "$DIGEST_DIR"
          DIGEST=$(grep "=" "$DIGEST_DIR/main-bluefin-x86_64.txt" | head -1 | cut -d= -f2-)
          echo "image=ghcr.io/${{ github.repository_owner }}/bluefin@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Promoting: ghcr.io/${{ github.repository_owner }}/bluefin@${DIGEST}"

      - name: Get nvidia digest for e2e gate
        id: get-nvidia-digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DIGEST_DIR="$RUNNER_TEMP/digest-nvidia"
          rm -rf "$DIGEST_DIR"
          mkdir -p "$DIGEST_DIR"
          gh run download "${{ steps.find-build.outputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --name "image-digest-testing-bluefin-nvidia-x86_64" \
            --dir "$DIGEST_DIR" 2>/dev/null || {
            echo "::warning::nvidia digest not found — skipping nvidia promotion gate"
            echo "image=" >> "$GITHUB_OUTPUT"
            exit 0
          }
          DIGEST=$(grep -hoE 'sha256:[0-9a-f]{64}' "$DIGEST_DIR"/*.txt | head -1)
          if [[ -z "$DIGEST" ]]; then
            echo "::warning::Could not extract nvidia digest — skipping gate"
            echo "image=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "image=ghcr.io/${{ github.repository_owner }}/bluefin-nvidia@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Found nvidia digest: ${DIGEST}"

  e2e:
    needs: [verify-e2e]
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ${{ needs.verify-e2e.outputs.image }}
      # TODO(#411): 'software' suite is gnomeos-only (GNOME Software); Bluefin ships Warehouse.
      # Removed to prevent infra/boot failures in the software suite from blocking stable promotion.
      suites: developer,vanilla-gnome,common

  e2e-nvidia:
    needs: [verify-e2e]
    if: needs.verify-e2e.outputs.nvidia_image != ''
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ${{ needs.verify-e2e.outputs.nvidia_image }}
      suites: smoke,common
    secrets: inherit

  promote-to-latest-and-stable:
    if: >-
      always() &&
      needs.verify-e2e.result == 'success' &&
      needs.e2e.result == 'success' &&
      (
        needs.verify-e2e.outputs.nvidia_image == '' ||
        needs.e2e-nvidia.result == 'success'
      )
    needs: [e2e, e2e-nvidia, verify-e2e]
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: main

      - name: Verify main SHA has not advanced
        env:
          LOCKED_SHA: ${{ needs.verify-e2e.outputs.testing_sha }}
        run: |
          set -euo pipefail
          git fetch origin main
          CURRENT_SHA=$(git rev-parse origin/main)
          if [ "$CURRENT_SHA" != "$LOCKED_SHA" ]; then
            echo "ERROR: main advanced during e2e ($LOCKED_SHA → $CURRENT_SHA)"
            echo "Untested commits would reach latest/stable. Aborting — rerun next week."
            exit 1
          fi
          echo "✅ main SHA unchanged: $CURRENT_SHA"

      - name: Download all testing image digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ needs.verify-e2e.outputs.build_run_id }}" \
            --repo "${{ github.repository }}" \
            --pattern "image-digest-testing-*" \
            --dir /tmp/all-digests
          echo "Downloaded digest files:"
          find /tmp/all-digests -name "*.txt" | sort

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify cosign signatures before promotion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          FAILED=0

          while IFS= read -r -d '' f; do
            line=$(grep "=" "$f" | head -1)
            IMAGE_NAME="${line%%=*}"
            DIGEST="${line##*=}"
            if [[ -z "$IMAGE_NAME" || -z "$DIGEST" ]]; then
              echo "WARNING: Could not parse $f — skipping verification"
              continue
            fi
            REF="${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
            echo "Verifying signature: ${REF}"
            if ! cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository_owner }}/(bluefin|bluefin-lts|aurora|actions)/.github/workflows/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${REF}" 2>/dev/null; then
              echo "::error::Signature verification FAILED for ${IMAGE_NAME}@${DIGEST}"
              FAILED=$((FAILED + 1))
            else
              echo "  ✅ Signature verified: ${IMAGE_NAME}"
            fi
          done < <(find /tmp/all-digests -name "*.txt" -print0)

          if [[ "${FAILED}" -gt 0 ]]; then
            echo "::error::${FAILED} image(s) failed signature verification — aborting promotion"
            exit 1
          fi
          echo "✅ All signatures verified — proceeding with promotion"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag tested images to :latest and :stable
        run: |
          set -euo pipefail
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          PROMOTED=0

          while IFS= read -r -d '' f; do
            # Each file contains: IMAGE_NAME=sha256:xxxx
            line=$(grep "=" "$f" | head -1)
            IMAGE_NAME="${line%%=*}"
            DIGEST="${line##*=}"
            if [[ -z "$IMAGE_NAME" || -z "$DIGEST" ]]; then
              echo "WARNING: Could not parse $f — skipping"
              continue
            fi

            SRC="docker://${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
            echo "Retagging ${IMAGE_NAME}@${DIGEST}"
            skopeo copy --all "${SRC}" "docker://${REGISTRY}/${IMAGE_NAME}:latest"
            skopeo copy --all "${SRC}" "docker://${REGISTRY}/${IMAGE_NAME}:stable"
            echo "  ✅ ${IMAGE_NAME}:latest and :stable updated"
            PROMOTED=$((PROMOTED + 1))
          done < <(find /tmp/all-digests -name "*.txt" -print0)

          echo "✅ Promoted ${PROMOTED} image(s) to :latest and :stable"
          echo "Tested artifacts are now live — no rebuild was triggered."

  generate-release:
    name: Generate release notes
    needs: [promote-to-latest-and-stable]
    if: needs.promote-to-latest-and-stable.result == 'success'
    permissions:
      contents: write
      actions: read
    uses: ./.github/workflows/generate-release.yml
    with:
      stream_name: '["stable"]'

  close-failure-issue:
    name: Close stale failure issue on success
    needs: [promote-to-latest-and-stable]
    if: needs.promote-to-latest-and-stable.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Close open failure issue if present
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'ci: weekly promotion e2e failure';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const open = existing.data.find(i => i.title === title);
            if (open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed stale failure issue #${open.number}`);
            }

  report-failure:
    needs: [verify-e2e, e2e, e2e-nvidia, promote-to-latest-and-stable]
    if: always() && failure() && needs.verify-e2e.outputs.image != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const image = '${{ needs.verify-e2e.outputs.image }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'ci: weekly promotion e2e failure';
            const body = `## Weekly Promotion E2E Failure\n\n**Image:** \`${image}\`\n**Run:** ${runUrl}\n**Suites:** developer,vanilla-gnome,common\n\n_Automatically opened by weekly-testing-promotion.yml_`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['area/testing', 'kind/bug', 'priority/p1'],
              });
            }
