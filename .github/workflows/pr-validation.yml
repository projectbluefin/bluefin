name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - testing
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      needs_e2e: ${{ steps.detect.outputs.image_changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: projectbluefin/actions/bootc-build/detect-changes@4ec3db50adc3a2b944e175295d419d78eaa63861 # v1
        id: detect

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Constrain the shared validate-pr composite to a repo-pinned pre-commit.
      PIP_CONSTRAINT: ${{ github.workspace }}/.github/requirements-ci.txt
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate
        uses: projectbluefin/actions/bootc-build/validate-pr@4ec3db50adc3a2b944e175295d419d78eaa63861 # v1

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run unit tests
        run: just test-unit

  testsuite:
    name: E2E smoke
    needs: [detect-changes]
    # Skip for PRs that only touch non-image paths (e.g. action bumps, workflow edits).
    # Always run for merge_group to gate merges to main with the full check.
    if: |
      always() &&
      (github.event_name == 'merge_group' ||
       needs.detect-changes.outputs.needs_e2e == 'true')
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    # Keep the testsuite SHA centralized in run-testsuite.yml.
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ghcr.io/projectbluefin/bluefin:testing
      suites: smoke
