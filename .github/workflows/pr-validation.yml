name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - testing
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate PR
        uses: projectbluefin/actions/bootc-build/validate-pr@v1
        with:
          dockerfile: Containerfile
          config: .hadolint.yaml

      - name: Run pre-commit
        shell: bash
        run: pre-commit run --all-files

  testsuite:
    name: E2E smoke
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ghcr.io/projectbluefin/bluefin:testing
      suites: smoke
