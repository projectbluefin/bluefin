name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - testing
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Constrain the shared validate-pr composite to a repo-pinned pre-commit.
      PIP_CONSTRAINT: ${{ github.workspace }}/.github/requirements-ci.txt
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # TODO: once projectbluefin/actions PR #65 merges and @v1 is updated, pin back to @v1
      - name: Validate
        uses: projectbluefin/actions/bootc-build/validate-pr@7a90e86191aaf14ec84b17215709a0f923d4b741 # feat/validate-pr-enhancements — pending PR #65
        with:
          system-files-shellcheck-glob: "system_files/**/*.sh"
          enable-desktop-file-validate: "true"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run unit tests
        run: bats tests/unit/package-lib_test.bats

  testsuite:
    name: E2E smoke
    # Only gate actual merges — not every PR push.
    if: github.event_name == 'merge_group'
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    # Keep the testsuite SHA centralized in run-testsuite.yml.
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ghcr.io/projectbluefin/bluefin:testing
      suites: smoke
