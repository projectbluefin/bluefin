name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - testing
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      needs_e2e: ${{ steps.detect.outputs.image_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: projectbluefin/actions/bootc-build/detect-changes@4387ca8dfc2f33db48b30e3ccc2011f1df5f8b10 # feat/detect-changes-action
        id: detect

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate PR
        uses: projectbluefin/actions/bootc-build/validate-pr@v1
        with:
          dockerfile: Containerfile
          config: .hadolint.yaml

      - name: Run pre-commit
        shell: bash
        run: pre-commit run --all-files

  testsuite:
    name: E2E smoke
    needs: [detect-changes]
    # Skip for PRs that only touch non-image paths (e.g. action bumps, workflow edits).
    # Always run for merge_group to gate merges to main with the full check.
    if: |
      always() &&
      (github.event_name == 'merge_group' ||
       needs.detect-changes.outputs.needs_e2e == 'true')
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ghcr.io/projectbluefin/bluefin:testing
      suites: smoke
