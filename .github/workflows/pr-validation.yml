name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - testing
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate PR
        uses: projectbluefin/actions/bootc-build/validate-pr@7378f8b82909dd07405fa6d6c5c1ac6ddf917313
        with:
          dockerfile: Containerfile
          hadolint-config: .hadolint.yaml
          shellcheck-glob: "build_files/**/*.sh"

  testsuite:
    name: E2E smoke
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@32f06097321bc4237dbdee2484b7e3e1b2a89155 # main
    with:
      image: ghcr.io/projectbluefin/bluefin:testing
      suites: smoke
