name: PR Validation — testsuite

on:
  pull_request:
    branches:
      - testing
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap just
        uses: ./.github/actions/bootstrap-just

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Check Just syntax
        shell: bash
        run: just check

      - name: Shellcheck build scripts
        shell: bash
        run: |
          shopt -s globstar nullglob
          shellcheck build_files/**/*.sh

      - name: Lint Containerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Containerfile
          config: .hadolint.yaml

      - name: Run pre-commit
        shell: bash
        run: pre-commit run --all-files

  testsuite:
    name: E2E smoke
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@5d2731317911cd875077fe1576761635859cc728 # main
    with:
      image: ghcr.io/projectbluefin/bluefin:testing
      suites: smoke
