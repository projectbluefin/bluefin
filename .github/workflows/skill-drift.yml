name: Skill Drift

on:
  pull_request:
    branches: [testing]

permissions:
  contents: read
  pull-requests: read

jobs:
  skill-drift:
    # Guardrail: CI/workflow changes must update the matching skill and docs in the same PR.
    uses: projectbluefin/actions/.github/workflows/skill-drift-check.yml@74c4356b36dd94c0eadf15bbe63a26b58a0e7468 # v1
    with:
      code-paths: '[".github/workflows/**", ".github/actions/**", "build_files/**", "Justfile", "recipes/**"]'
      skill-paths: '["docs/skills/**", "docs/*.md", "AGENTS.md"]'
