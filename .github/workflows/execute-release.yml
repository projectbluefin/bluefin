name: Execute Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is-promotion: ${{ steps.check.outputs.is-promotion }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] || echo "$COMMIT_MSG" | grep -qE "^chore: promote testing to main"; then
            echo "is-promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-promotion=false" >> "$GITHUB_OUTPUT"
          fi

  execute:
    needs: [check-trigger]
    if: needs.check-trigger.outputs.is-promotion == 'true'
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-execute-release.yml@v1
    with:
      registry: ghcr.io/projectbluefin
      variants: >-
        [
          {"image":"bluefin","source_tag":"testing","target_tag":"stable"},
          {"image":"bluefin-nvidia","source_tag":"testing","target_tag":"stable"}
        ]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
    secrets: inherit

  release-notes:
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    permissions:
      actions: read
      contents: write
      id-token: write
      packages: read
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@v1
    with:
      stream_name: stable
      image: ghcr.io/projectbluefin/bluefin
      generate_sbom_inline: true
      checkout_ref: main
      project_name: Bluefin
      badge_label: Stable
      accent_color: "#0ea5e9"
      cert_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
      notable_packages: >-
        [
          {"sbom_name": "kernel",            "label": "Kernel"},
          {"sbom_name": "gnome-shell",        "label": "GNOME Shell"},
          {"sbom_name": "mesa-filesystem",    "label": "Mesa"},
          {"sbom_name": "flatpak",            "label": "Flatpak"},
          {"sbom_name": "systemd",            "label": "systemd"}
        ]
      docs_url: https://docs.projectbluefin.io/changelogs
    secrets: inherit

  post-release-variants:
    needs: [execute, release-notes]
    if: always() && needs.release-notes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve promoted digests
        id: digests
        run: |
          set -euo pipefail
          for image in bluefin bluefin-nvidia; do
            digest=$(skopeo inspect --no-tags "docker://ghcr.io/projectbluefin/${image}:stable" \
              | jq -r '.Digest' | cut -c1-19)
            echo "${image}=${digest}" >> "$GITHUB_OUTPUT"
          done

      - name: Prepend variants table to release
        env:
          BLUEFIN_DIGEST: ${{ steps.digests.outputs.bluefin }}
          NVIDIA_DIGEST: ${{ steps.digests.outputs.bluefin-nvidia }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          CURRENT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')

          VARIANTS_SECTION=$(printf '%s\n' \
            '## Variants promoted' \
            '' \
            '| Variant | Tag | Digest |' \
            '|---|---|---|' \
            "| \`bluefin\` | \`:stable\` | \`${BLUEFIN_DIGEST}\` |" \
            "| \`bluefin-nvidia\` | \`:stable\` | \`${NVIDIA_DIGEST}\` |" \
            '' \
            '---' \
            '')
          printf '%s\n%s' "$VARIANTS_SECTION" "$CURRENT" > /tmp/updated-body.md
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes-file /tmp/updated-body.md
