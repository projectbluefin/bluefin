name: Execute Release
on:
  workflow_dispatch:
permissions:
  id-token: write
jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is-promotion: ${{ steps.check.outputs.is-promotion }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] || echo "$COMMIT_MSG" | grep -qE "^ci\(promote\): bluefin testing"; then
            echo "is-promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-promotion=false" >> "$GITHUB_OUTPUT"
          fi

  execute:
    needs: [check-trigger]
    if: needs.check-trigger.outputs.is-promotion == 'true'
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-execute-release.yml@v1
    with:
      registry: ghcr.io/projectbluefin
      variants: >-
        [{"image":"bluefin","source_tag":"testing","target_tag":"stable"}]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
    secrets: inherit

  release-notes:
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    permissions:
      actions: read
      contents: write
      id-token: write
      packages: read
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@v1
    with:
      stream_name: stable
      image: ghcr.io/projectbluefin/bluefin
    secrets: inherit
