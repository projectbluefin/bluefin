name: Execute Release

# Triggered by a push to main whose commit message starts with
# "chore: promote testing to main" — the squash commit produced by
# promote-testing-to-main.yml.
#
# Why push instead of pull_request: closed:
# GitHub blocks pull_request-triggered workflows when the triggering PR was
# created by github-actions[bot] AND the PR modifies .github/workflows/ files.
# The promotion squash always carries SHA pin bumps from Renovate, so the
# pull_request: closed trigger would produce startup_failed on every release.
# A push: [main] trigger is not subject to this restriction.

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is-promotion: ${{ steps.check.outputs.is-promotion }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q "^chore: promote testing to main"; then
            echo "is-promotion=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-promotion=false" >> "$GITHUB_OUTPUT"
          fi

  execute:
    needs: [check-trigger]
    if: needs.check-trigger.outputs.is-promotion == 'true'
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-execute-release.yml@efa19f2c3efdcbef1c55a1730229891d781fd11b # v1
    with:
      registry: ghcr.io/projectbluefin
      variants: >-
        [
          {"image":"bluefin","source_tag":"testing","target_tag":"stable"},
          {"image":"bluefin-nvidia","source_tag":"testing","target_tag":"stable"}
        ]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
    secrets: inherit

  release-notes:
    needs: [execute]
    if: always() && needs.execute.result == 'success'
    permissions:
      contents: write
      id-token: write
      packages: read
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@efa19f2c3efdcbef1c55a1730229891d781fd11b # v1
    with:
      stream_name: stable
      image: ghcr.io/projectbluefin/bluefin
      generate_sbom_inline: true
      checkout_ref: main
      project_name: Bluefin
      badge_label: Stable
      accent_color: "#0ea5e9"
      cert_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
      notable_packages: >-
        [
          {"sbom_name": "kernel", "label": "Kernel"},
          {"sbom_name": "gnome-shell", "label": "GNOME Shell"},
          {"sbom_name": "flatpak", "label": "Flatpak"},
          {"sbom_name": "systemd", "label": "systemd"}
        ]
      docs_url: https://docs.projectbluefin.io/changelogs
    secrets: inherit
