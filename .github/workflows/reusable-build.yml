name: Reusable Build and Push
on:
  workflow_call:
    outputs:
      digests:
        description: "JSON map of image_name to digest"
        value: ${{ jobs.collect-digests.outputs.digests }}
    inputs:
      image_flavors:
        description: "JSON array of flavors to build"
        default: '["main", "nvidia-open"]'
        type: string
      brand_name:
        description: "The Brand Name: bluefin"
        default: bluefin
        type: string
      stream_name:
        description: "The Fedora Version: stable, latest, or beta"
        required: true
        type: string
      kernel_pin:
        description: "The full kernel version to pin"
        type: string
      architecture:
        description: "JSON string of architectures to build, '[\"aarch64\", \"x86_64\"]'"
        default: "['x86_64']"
        required: false
        type: string
      pr_number:
        description: "PR number when dispatched from e2e-dispatch — enforces PR-scoped tags"
        default: ""
        required: false
        type: string

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install just
        uses: taiki-e/install-action@35e522e91305799a18f8cee79bf13d1f7b28b796 # just

      - name: Check Just syntax
        run: just check

  build_container:
    name: image
    needs: [preflight]
    runs-on: ${{ matrix.architecture == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    env:
      DIGEST_FILE: ${{ github.workspace }}/.push-digest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        image_flavor: ${{ fromJson(inputs.image_flavors) }}
        base_name: ["${{ inputs.brand_name }}", "${{ inputs.brand_name }}-dx"]
        stream_name: ["${{ inputs.stream_name }}"]
        architecture: ${{ fromJson(inputs.architecture) }}
        exclude:
          - architecture: aarch64
            base_name: "${{ inputs.brand_name }}-dx"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Bootstrap just
        uses: ./.github/actions/bootstrap-just

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Update Podman
        shell: bash
        run: |
          set -eux
          # TODO: remove when Ubuntu 26.04 runners ship a new-enough podman
          # Old podman does not push layer annotations (ostree.components) needed by the
          # rpm-ostree rechunker, and does not support zstd:chunked push correctly
          IDV=$(. /usr/lib/os-release && echo ${ID}-${VERSION_ID})
          test "${IDV}" = "ubuntu-24.04"
          if [ "$(dpkg --print-architecture)" = "amd64" ]; then
            mirror="http://azure.archive.ubuntu.com/ubuntu"
          else
            mirror="http://ports.ubuntu.com/ubuntu-ports"
          fi
          echo "deb ${mirror} resolute universe main" | sudo tee /etc/apt/sources.list.d/resolute.list
          /bin/time -f '%E %C' sudo apt update
          /bin/time -f '%E %C' sudo apt install -y --allow-downgrades crun/resolute buildah/resolute podman/resolute skopeo/resolute
          podman --version

      - name: Image Name
        shell: bash
        run: |
          IMAGE_NAME="$(just image_name ${{ matrix.base_name }} ${{ matrix.stream_name }} ${{ matrix.image_flavor }})"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Default Tag
        shell: bash
        run: |
          DEFAULT_TAG="$(just generate-default-tag \
                       ${{ matrix.stream_name }} \
                       "1")"
          echo "Default Tag: ${DEFAULT_TAG}"
          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> "$GITHUB_ENV"

      - name: DNF Package Cache Setup
        shell: bash
        id: setup-cache
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          CACHE="$(just setup-cache "${MATRIX_BASE_NAME}" \
                            "${MATRIX_STREAM_NAME}" \
                            "1" \
                            "${GITHUB_EVENT_NAME}")"

          CACHE_NAME="$(echo "${CACHE}" | cut -d' ' -f 1)"
          ALLOW_CACHE_WRITE="$(echo "${CACHE}" | cut -d' ' -f 2)"

          echo "cache_name=${CACHE_NAME}" >> "$GITHUB_OUTPUT"
          echo "allow_cache_write=${ALLOW_CACHE_WRITE}" >> "$GITHUB_OUTPUT"

      - name: Restore DNF package cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_NAME: ${{ steps.setup-cache.outputs.cache_name }}
        with:
          path: /var/tmp/buildah-cache-*
          key: ${{ runner.os }}-${{ matrix.architecture }}-buildah-${{ env.CACHE_NAME }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.architecture }}-buildah-

      - name: Record build start time
        id: build-timing
        shell: bash
        run: echo "build_start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for layer cache
        if: github.event_name != 'pull_request'
        run: echo ${{ secrets.GITHUB_TOKEN }} | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        id: build-image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_CACHE_WRITE: ${{ github.event_name != 'pull_request' && '1' || '0' }}
        run: |
          sudo -E "$(command -v just)" repo_organization="${{ github.repository_owner }}" \
                    build-ghcr "${{ matrix.base_name }}" \
                               "${{ matrix.stream_name }}" \
                               "${{ matrix.image_flavor }}" \
                               "${{ inputs.kernel_pin }}"

      - name: Record build duration
        id: build-duration
        shell: bash
        run: |
          BUILD_END=$(date +%s)
          BUILD_ELAPSED=$(( BUILD_END - ${{ steps.build-timing.outputs.build_start }} ))
          echo "build_seconds=${BUILD_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Build duration: $(( BUILD_ELAPSED / 60 ))m $(( BUILD_ELAPSED % 60 ))s"

      # https://github.com/actions/cache/issues/1533
      - name: Hack around permission issue caching
        shell: bash
        id: cache-perms
        run: |
          sudo chmod 777 --recursive /var/tmp/buildah-cache-0

      - name: Write new DNF package cache
        if: steps.setup-cache.outputs.allow_cache_write == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_NAME: ${{ steps.setup-cache.outputs.cache_name }}
        with:
          path: /var/tmp/buildah-cache-*
          key: ${{ runner.os }}-${{ matrix.architecture }}-buildah-${{ env.CACHE_NAME }}

      - name: Setup Syft
        id: setup-syft
        # Skip SBOM for testing stream — runner lifetime is ~26 min; build alone takes ~22 min.
        # Once bluefin-cache is public and caching is active, remove this condition.
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.44.0

      - name: Generate SBOM
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: generate-sbom
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
        run: |
          sudo -E "$(command -v just)" gen-sbom "${MATRIX_BASE_NAME}" \
                            "${MATRIX_STREAM_NAME}" \
                            "${MATRIX_IMAGE_FLAVOR}" \
                            "${SYFT_CMD}"

      - name: Upload SBOM as release artifact
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        run: |
          mkdir -p /tmp/sbom-upload
          cp "sbom_out/${{ env.IMAGE_NAME }}/sbom.json" "/tmp/sbom-upload/${{ env.IMAGE_NAME }}.sbom.json"

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ env.IMAGE_NAME }}
          path: /tmp/sbom-upload/
          retention-days: 7

      - name: Record rechunk start time
        id: rechunk-timing
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        shell: bash
        run: echo "rechunk_start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Rechunk Image
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: rechunk-image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enable previous-build delta on scheduled/push; skip on manual override
          PREVIOUS_BUILD: ${{ github.event.inputs.previous_build || '1' }}
        run: |
          sudo -E "$(command -v just)" rechunk "${{ matrix.base_name }}" \
                            "${{ matrix.stream_name }}" \
                            "${{ matrix.image_flavor }}" \
                            "1" \
                            "0" \
                            "${PREVIOUS_BUILD}"

      - name: Retag Rechunked Image
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: load-rechunk
        shell: bash
        run: |
          sudo -E "$(command -v just)" load-rechunk "${{ matrix.base_name }}" \
                            "${{ env.DEFAULT_TAG }}" \
                            "${{ matrix.image_flavor }}"

      - name: Record rechunk duration
        id: rechunk-duration
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        shell: bash
        run: |
          RECHUNK_END=$(date +%s)
          RECHUNK_ELAPSED=$(( RECHUNK_END - ${{ steps.rechunk-timing.outputs.rechunk_start }} ))
          echo "rechunk_seconds=${RECHUNK_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Rechunk duration: $(( RECHUNK_ELAPSED / 60 ))m $(( RECHUNK_ELAPSED % 60 ))s"

      - name: Secureboot Check
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: secureboot
        shell: bash
        run: |
          sudo -E "$(command -v just)" secureboot "${{ matrix.base_name }}" \
                          "${{ env.DEFAULT_TAG }}" \
                          "${{ matrix.image_flavor }}"

      - name: Export image to OCI dir (PR only)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          mkdir -p ${{ env.IMAGE_NAME }}_build
          sudo podman save --format oci-dir -o ${{ env.IMAGE_NAME }}_build ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          # When pr_number is set (e2e dispatch from a PR branch), treat the build
          # as a pull_request event so generate-build-tags uses PR-scoped commit tags
          # instead of canonical stream tags (prevents overwriting :testing).
          EFFECTIVE_EVENT="${{ github.event_name }}"
          EFFECTIVE_NUMBER="${{ github.event.number }}"
          if [[ -n "${{ inputs.pr_number }}" ]]; then
            EFFECTIVE_EVENT="pull_request"
            EFFECTIVE_NUMBER="${{ inputs.pr_number }}"
          fi

          alias_tags="$(just generate-build-tags \
                     "${{ matrix.base_name }}" \
                     "${{ matrix.stream_name }}" \
                     "${{ matrix.image_flavor }}" \
                     "${{ inputs.kernel_pin }}" \
                     "1" \
                     "$(podman inspect ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} | jq -r '.[].Config.Labels["org.opencontainers.image.version"]')" \
                     "${EFFECTIVE_EVENT}" \
                     "${EFFECTIVE_NUMBER}")"

          echo "Tags for this Action..."
          echo "$alias_tags"
          echo "alias_tags=${alias_tags}" >> "$GITHUB_OUTPUT"

      # Tag Images
      - name: Tag Images
        shell: bash
        run: |
          set -eoux pipefail
          sudo -E "$(command -v just)" tag-images "${{ env.IMAGE_NAME }}" \
                          "${{ env.DEFAULT_TAG }}" \
                          "${{ steps.generate-tags.outputs.alias_tags }}"

      # Workaround bug where capital letters in your GitHub username make it impossible to push to GHCR.
      # https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@ecd1412d078f2e06e9eedcbaa6fcd988151c3f82 # v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Fix container auth permissions
        # 'Login to GHCR for layer cache' runs sudo podman login, which creates root-owned
        # files in $XDG_RUNTIME_DIR/containers/ (preserved by sudo due to env inheritance).
        # Restore ownership so the non-sudo push login and skopeo can read/write auth.json.
        # (sudo -E podman push can still read the file since root ignores ownership bits.)
        if: github.event_name != 'pull_request'
        run: |
          AUTH_DIR="/run/user/$(id -u)/containers"
          if [[ -d "${AUTH_DIR}" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "${AUTH_DIR}"
          fi

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Record push start time
        id: push-timing
        if: github.event_name != 'pull_request'
        shell: bash
        run: echo "push_start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 30
          command: |
            set -euox pipefail

            REGISTRY="${{ steps.registry_case.outputs.lowercase }}"
            IMAGE="${{ env.IMAGE_NAME }}"
            DEFAULT_TAG="${{ env.DEFAULT_TAG }}"

            rm -f "${{ env.DIGEST_FILE }}"

            # Push default tag with full upload (two-push pattern for annotation stability)
            # Workaround for https://github.com/containers/podman/issues/27796
            # Note: no --force-compression — rechunked layers are already zstd:chunked;
            # forcing re-compression would strip ostree.components annotations.
            sudo -E podman push \
              --compression-format zstd:chunked \
              --compression-level 3 \
              --retry 5 \
              --retry-delay 30s \
              "${IMAGE}:${DEFAULT_TAG}" "${REGISTRY}/${IMAGE}:${DEFAULT_TAG}"

            sudo -E podman push \
              --compression-format zstd:chunked \
              --compression-level 3 \
              --retry 5 \
              --retry-delay 30s \
              --digestfile "${{ env.DIGEST_FILE }}" \
              "${IMAGE}:${DEFAULT_TAG}" "${REGISTRY}/${IMAGE}:${DEFAULT_TAG}"

            # Server-side tag copies — no re-upload of image data
            # shellcheck disable=SC2086 - word splitting on alias_tags is intentional
            for tag in ${{ steps.generate-tags.outputs.alias_tags }}; do
              if [[ "${tag}" != "${DEFAULT_TAG}" ]]; then
                skopeo copy \
                  "docker://${REGISTRY}/${IMAGE}:${DEFAULT_TAG}" \
                  "docker://${REGISTRY}/${IMAGE}:${tag}"
              fi
            done

      - name: Record push duration
        id: push-duration
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          PUSH_END=$(date +%s)
          PUSH_ELAPSED=$(( PUSH_END - ${{ steps.push-timing.outputs.push_start }} ))
          echo "push_seconds=${PUSH_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Push duration: $(( PUSH_ELAPSED / 60 ))m $(( PUSH_ELAPSED % 60 ))s"

      - name: Upload OCI dir as Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.IMAGE_NAME }}.oci
          path: ${{ env.IMAGE_NAME }}_build
          if-no-files-found: warn
          retention-days: 1

      - name: PR Testing Instructions
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "### 🫐 Test this PR build"
            echo ""
            echo "Download the \`.oci\` artifact, unzip it, then:"
            echo '```bash'
            echo "sudo bootc switch --transport oci /absolute/path/to/${{ env.IMAGE_NAME }}_build"
            echo '```'
            echo "To go back:"
            echo '```bash'
            echo "sudo bootc switch --enforce-container-sigpolicy ghcr.io/projectbluefin/${{ env.IMAGE_NAME }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export digest
        id: digest
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(cat "${{ env.DIGEST_FILE }}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build telemetry summary
        if: always()
        shell: bash
        run: |
          BUILD_S=${{ steps.build-duration.outputs.build_seconds || 0 }}
          RECHUNK_S=${{ steps.rechunk-duration.outputs.rechunk_seconds || 0 }}
          PUSH_S=${{ steps.push-duration.outputs.push_seconds || 0 }}
          BUILD_START=${{ steps.build-timing.outputs.build_start || 0 }}
          SUMMARY_END=$(date +%s)
          WALL_CLOCK_S=0
          if [[ "${BUILD_START}" -gt 0 ]]; then
            WALL_CLOCK_S=$(( SUMMARY_END - BUILD_START ))
          fi

          IMAGE_SIZE=$(sudo podman image inspect "${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{.Size}}' 2>/dev/null || echo "0")
          IMAGE_SIZE_MB=$(( IMAGE_SIZE / 1024 / 1024 ))
          LAYER_COUNT=$(sudo podman image inspect "${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{len .RootFS.Layers}}' 2>/dev/null || echo "?")

          {
            echo "## 📊 Build Telemetry: ${{ env.IMAGE_NAME }}"
            echo ""
            echo "| Stage | Duration |"
            echo "|-------|----------|"
            printf "| Build | %dm %ds |\n" $(( BUILD_S / 60 )) $(( BUILD_S % 60 ))
            if [[ "${RECHUNK_S}" -gt 0 ]]; then
              printf "| Rechunk | %dm %ds |\n" $(( RECHUNK_S / 60 )) $(( RECHUNK_S % 60 ))
            fi
            if [[ "${PUSH_S}" -gt 0 ]]; then
              printf "| Push | %dm %ds |\n" $(( PUSH_S / 60 )) $(( PUSH_S % 60 ))
            fi
            printf "| **Total wall-clock** | **%dm %ds** |\n" $(( WALL_CLOCK_S / 60 )) $(( WALL_CLOCK_S % 60 ))
            echo ""
            echo "**Image size (uncompressed):** ${IMAGE_SIZE_MB} MB"
            echo "**Layer count:** ${LAYER_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write digest to artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          echo "${{ env.IMAGE_NAME }}=${{ steps.digest.outputs.digest }}" >> /tmp/digests/${{ matrix.image_flavor }}-${{ matrix.base_name }}.txt

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ inputs.stream_name }}-${{ matrix.base_name }}-${{ matrix.image_flavor }}
          path: /tmp/digests/
          retention-days: 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: github.event_name != 'pull_request'

      - name: Fix sigstore cache permissions
        if: github.event_name != 'pull_request'
        run: sudo chown -R "$(id -u):$(id -g)" "${HOME}/.sigstore" 2>/dev/null || true

      - name: Sign container image
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cosign sign -y "${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}@${TAGS}"
        env:
          TAGS: ${{ steps.digest.outputs.digest }}

      - name: Verify signature
        if: github.event_name != 'pull_request'
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Verify rechunk metadata preserved
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        run: |
          set -euo pipefail
          IMAGE_REF="${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}"
          MANIFEST=$(skopeo inspect --raw "docker://${IMAGE_REF}")
          # Check that at least one layer carries an ostree.components annotation —
          # if all annotations are absent the rechunk push stripped zstd+metadata.
          if echo "${MANIFEST}" | jq -e '
            .layers // [] |
            map(select(.annotations != null and (.annotations | has("ostree.components")))) |
            length > 0
          ' > /dev/null 2>&1; then
            echo "✅ ostree.components annotations present — rechunk metadata preserved"
          else
            echo "⚠️  ostree.components annotations missing from pushed image — rechunk metadata may have been stripped"
            echo "    This is non-fatal for now; tracked in issue #106"
          fi

      - name: Install ORAS
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Login to GitHub Container Registry with ORAS
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Upload SBOM
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: upload-sbom
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SBOM="sbom_out/${IMAGE_NAME}/sbom.json"

          cd "$(dirname "${SBOM}")"
          oras attach \
            --artifact-type application/vnd.spdx+json \
            --annotation "filename=$(basename "$SBOM")" \
            "${IMAGE}@${DIGEST}" \
            "$(basename "$SBOM")"

          sbom_digest=$(oras discover --format json "${IMAGE}@${DIGEST}" | jq -r '.referrers[] | select(.artifactType == "application/vnd.spdx+json") | .digest')

          echo "sbom_digest=${sbom_digest}" >> "$GITHUB_OUTPUT"

      - name: Sign SBOM OCI Artifact
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cosign sign -y "${LOWERCASE}/${IMAGE_NAME}@${SBOM_DIGEST}"
        env:
          LOWERCASE: ${{ steps.registry_case.outputs.lowercase }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SBOM_DIGEST: ${{ steps.upload-sbom.outputs.sbom_digest }}

      - name: Attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  check:
    name: Check all ${{ inputs.stream_name }} builds successful
    if: always()
    runs-on: ubuntu-latest
    needs: [build_container]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo "$JOBS" | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo "$JOBS" | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done

  collect-digests:
    name: Collect image digests
    runs-on: ubuntu-latest
    needs: [check]
    outputs:
      digests: ${{ steps.merge.outputs.digests || steps.empty.outputs.digests }}
    steps:
      - name: Download all digest artifacts
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: image-digest-${{ inputs.stream_name }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Merge digests
        if: github.event_name != 'pull_request'
        id: merge
        run: |
          DIGESTS=$(cat /tmp/digests/*.txt | jq -Rs 'split("\n") | map(select(length > 0)) | map(split("=")) | map({(.[0]): .[1]}) | add')
          {
            echo "digests<<EOF"
            echo "${DIGESTS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set empty digests
        if: github.event_name == 'pull_request'
        id: empty
        run: |
          echo 'digests={}' >> "$GITHUB_OUTPUT"
