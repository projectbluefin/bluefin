name: Post-Testing E2E

# Runs e2e smoke tests after every successful push build on main.
# This gates main continuously so the weekly promotion
# (weekly-testing-promotion.yml) promotes only e2e-verified commits.
on:
  workflow_run:
    workflows: ["Testing Images"]
    types: [completed]
    branches: [main]

permissions: read-all

concurrency:
  group: post-testing-e2e-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  e2e:
    # Only run for push events (not merge_group or workflow_dispatch)
    # and only when the build succeeded.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      image: ${{ steps.get-digest.outputs.image }}
    steps:
      - name: Download build digest
        id: get-digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --name "image-digest-testing-bluefin-main" \
            --dir /tmp/digest
          DIGEST=$(grep "=" /tmp/digest/main-bluefin.txt | head -1 | cut -d= -f2-)
          echo "image=ghcr.io/${{ github.repository_owner }}/bluefin@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Testing image: ghcr.io/${{ github.repository_owner }}/bluefin@${DIGEST}"

  run-e2e:
    needs: [e2e]
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ${{ needs.e2e.outputs.image }}
      suites: smoke,common

  run-upgrade-test:
    needs: [e2e]
    permissions:
      packages: write
      contents: read
    uses: projectbluefin/actions/.github/workflows/upgrade-test.yml@19058ec8319ab6f0c9a07d69e4dbbf078bf8457b # feat/lifecycle-chunked-input
    with:
      image: ${{ needs.e2e.outputs.image }}
      suites: lifecycle

  report-failure:
    needs: [e2e, run-e2e, run-upgrade-test]
    if: failure() && needs.e2e.outputs.image != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const image = '${{ needs.e2e.outputs.image }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = '${{ github.event.workflow_run.head_sha }}'.slice(0, 8);
            const title = `ci: e2e smoke test failure — ${sha}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Failure recurred in run ${runUrl} for image \`${image}\``,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## E2E Smoke Test Failure\n\n**Image:** \`${image}\`\n**Commit:** ${sha}\n**Run:** ${runUrl}\n**Suites:** smoke,common\n\n_Automatically opened by post-testing-e2e.yml_`,
                labels: ['area/testing', 'kind/bug', 'priority/p1'],
              });
            }
