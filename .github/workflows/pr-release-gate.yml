name: PR Release Gate

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  setup:
    if: github.event.pull_request.head.ref == 'auto/promote-testing-to-main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      main_sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Get current main HEAD SHA
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha')
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

  gate:
    needs: [setup]
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-gate.yml@1ffc224bde5fe89af00d2b9c182a70dedc061a58 # v1
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      head_sha: ${{ needs.setup.outputs.main_sha }}
      registry: ghcr.io/projectbluefin
      variants: >-
        [{"image":"bluefin"},{"image":"bluefin-nvidia"}]
      cosign_identity_regexp: ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
      target_tag: testing
      run_e2e: true
      e2e_suites: smoke,common
      e2e_image: ghcr.io/projectbluefin/bluefin:testing
    secrets: inherit
