name: Nightly E2E

# Runs the vanilla-gnome baseline suite nightly against :latest.
# vanilla-gnome tests upstream GNOME behaviour as a comparison baseline:
#   smoke=fail + vanilla-gnome=pass  → Bluefin-specific regression
#   smoke=fail + vanilla-gnome=fail  → upstream GNOME issue
#
# Also re-runs the full smoke+common suite so nightly catches anything
# that slips past the per-push gate on low-traffic days.

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC daily
  workflow_dispatch:

permissions: read-all

concurrency:
  group: nightly-e2e
  cancel-in-progress: true

jobs:
  e2e:
    permissions:
      packages: write
      contents: read
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@32f06097321bc4237dbdee2484b7e3e1b2a89155 # main
    with:
      image: ghcr.io/${{ github.repository_owner }}/bluefin:latest
      suites: smoke,common,vanilla-gnome
