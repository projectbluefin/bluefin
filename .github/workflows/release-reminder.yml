name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@cdc34cf64c8a92293cc3cd8584b4c02e31d78c9e # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
