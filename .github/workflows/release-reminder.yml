name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@40981f905c9bcdf8a2386342b5acc0071ac2546d # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
