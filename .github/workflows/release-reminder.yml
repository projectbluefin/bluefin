name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@1dac4acc6897f4cfdfc6c96f872fb0171a478981 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
