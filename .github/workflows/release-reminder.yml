name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@1ffc224bde5fe89af00d2b9c182a70dedc061a58 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
