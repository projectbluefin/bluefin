name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@aff35fb22815a4cdbf505fec9f8d1808717896d3 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
