name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@d1bec11e3fcd610e3285b3f50615c1f35c2d2455 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
