name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@74c4356b36dd94c0eadf15bbe63a26b58a0e7468 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
