name: Release Reminder

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  reminder:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-reminder.yml@5f3cabacecd1a7b95b7f64b03aa4c298ff73f918 # v1
    with:
      days_warn: 7
      days_escalate: 14
    secrets: inherit
