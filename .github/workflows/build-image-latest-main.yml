name: Latest Images
on:
  pull_request:
    branches:
      - latest
    paths-ignore:
      - ".github/workflows/*validate*.yml"
      - "**.md"
      - "system_files/shared/etc/bazaar/**"
  push:
    branches:
      - latest
    paths-ignore:
      - ".github/workflows/*validate*.yml"
      - "**.md"
      - "system_files/shared/etc/bazaar/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write
  artifact-metadata: write

jobs:
  build-image-latest:
    name: Build Latest Images
    # Thin caller only: shared build orchestration belongs in projectbluefin/actions.
    # Keep repo-local edits here limited to triggers, permissions, and reusable-build inputs.
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'latest'
    uses: projectbluefin/actions/.github/workflows/reusable-build.yml@38dc24b919e557a1204e26641887af792bf6cbad # v1
    with:
      stream_name: latest
      # FIXME: enable when ublue-os/akmods has ARM builds
      # architecture: '["aarch64","x86_64"]'
      architecture: '["x86_64"]'
