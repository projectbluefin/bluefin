name: Run Testsuite

# Canonical wrapper — always call this, never call projectbluefin/testsuite e2e.yml directly.
# Uses @v1 managed tag — testsuite auto-tracks v1 to main on every merge via update-v1-tag.yml.
# Never SHA-pin this ref; use @v1 so E2E picks up testsuite fixes immediately.
on:
  workflow_call:
    inputs:
      image:
        description: "Full image reference to test (e.g. ghcr.io/projectbluefin/bluefin:testing)"
        required: true
        type: string
      suites:
        description: "Comma-separated list of test suites to run"
        required: true
        type: string

jobs:
  e2e:
    name: ${{ inputs.suites }}
    permissions:
      contents: read
      packages: write  # testsuite pushes screenshot OCI artifacts to GHCR
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@7e41f7f58102e69ac794047e776aa298efa5c29f # v1
    with:
      image: ${{ inputs.image }}
      suites: ${{ inputs.suites }}
      # Keep the checked-out tests aligned with the managed workflow tag.
      # Defaulting to testsuite/main can gate bluefin on unreleased test changes.
      test_ref: v1
    secrets: inherit
