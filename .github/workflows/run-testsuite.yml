name: Run Testsuite

# Reusable wrapper around projectbluefin/testsuite e2e.yml.
# Uses @main (managed floating tag) — internal projectbluefin/ refs are never SHA-pinned.
# See docs/skills/ci-tooling.md for the internal vs external pin policy.
# Callers resolve their own image digest, then pass the full image ref.
# Callers can access overall result via needs.<job-id>.result.
on:
  workflow_call:
    inputs:
      image:
        description: "Full image ref to test (e.g. ghcr.io/projectbluefin/bluefin@sha256:…)"
        required: true
        type: string
      suites:
        description: "Comma-separated test suites to run"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@06964046d06651c5ae54c1836b8daf59feea0445 # main
    permissions:
      packages: write
      contents: read
    with:
      image: ${{ inputs.image }}
      suites: ${{ inputs.suites }}
    secrets: inherit
