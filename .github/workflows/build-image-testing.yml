name: Testing Images
on:
  merge_group:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/*validate*.yml"
      - "**.md"
      - "system_files/shared/etc/bazaar/**"
  workflow_call:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (set by e2e-dispatch to scope image tags to the PR)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  detect-changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_flavors: ${{ steps.matrix.outputs.image_flavors }}
      should_build: ${{ steps.matrix.outputs.should_build }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            image:
              - 'Containerfile'
              - 'build_files/**'
              - 'system_files/**'
              - 'image-versions.yml'
              - 'Justfile'
            nvidia:
              - 'build_files/base/04-install-kernel-akmods.sh'
              - 'Containerfile'
      - name: Set matrix
        id: matrix
        run: |
          if [[ "${{ steps.filter.outputs.image }}" == "false" ]]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo 'image_flavors=["main"]' >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.filter.outputs.nvidia }}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo 'image_flavors=["main", "nvidia-open"]' >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo 'image_flavors=["main"]' >> "$GITHUB_OUTPUT"
          fi

  build-image-testing:
    name: Build Testing Images
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || github.ref_name == 'main' || inputs.pr_number != '') &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.should_build == 'true')
    uses: projectbluefin/actions/.github/workflows/reusable-build.yml@8dfe8f713d0063e05d1d3f23a3dddffcb81fecfc # v1
    secrets: inherit
    with:
      image_flavors: >-
        ${{
          github.event_name == 'pull_request'
          && needs.detect-changes.outputs.image_flavors
          || '["main", "nvidia-open"]'
        }}
      stream_name: testing
      pr_number: ${{ inputs.pr_number }}
