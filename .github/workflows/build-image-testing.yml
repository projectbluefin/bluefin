name: Testing Images
on:
  merge_group:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/*validate*.yml"
      - "**.md"
      - "system_files/shared/etc/bazaar/**"
  workflow_call:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (set by e2e-dispatch to scope image tags to the PR)"
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  detect-changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_flavors: ${{ steps.detect.outputs.image_flavors }}
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: projectbluefin/actions/bootc-build/detect-changes@4ec3db50adc3a2b944e175295d419d78eaa63861 # v1
        id: detect

  build-image-testing:
    name: Build Testing Images
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || github.ref_name == 'main' || inputs.pr_number != '') &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.should_build == 'true')
    uses: projectbluefin/actions/.github/workflows/reusable-build.yml@13e3593568d87cfe075a86e3995930e350f8c5ea # v1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    with:
      image_flavors: >-
        ${{
          github.event_name == 'pull_request'
          && needs.detect-changes.outputs.image_flavors
          || '["main", "nvidia-open"]'
        }}
      stream_name: testing
      pr_number: ${{ inputs.pr_number }}
