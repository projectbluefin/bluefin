name: Stable Images
on:
  push:
    branches:
      - stable
    paths-ignore:
      - ".github/workflows/*validate*.yml"
      - "**.md"
      - "system_files/shared/etc/bazaar/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write
  artifact-metadata: write

jobs:
  build-image-stable:
    name: Build Stable Images
    # Thin caller only: shared build orchestration belongs in projectbluefin/actions.
    # Keep repo-local edits here limited to triggers, permissions, and reusable-build inputs.
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'stable'
    uses: projectbluefin/actions/.github/workflows/reusable-build.yml@1c60f20d89dacc5b35f93f8d63e949316fc7a0ba # v1
    with:
      # kernel_pin: 6.17.12-300.fc43.x86_64 ## Pin to 6.17 for ZFS compatibility
      stream_name: stable
      # FIXME: enable when ublue-os/akmods has ARM builds
      # architecture: '["aarch64","x86_64"]'
      architecture: '["x86_64"]'

  generate-release:
    name: Generate Release
    needs: [build-image-stable]
    uses: projectbluefin/actions/.github/workflows/reusable-release.yml@599328cbb21d05094f6851b6da32c85f3a5363de # v1
    with:
      stream_name: stable
      image: ghcr.io/projectbluefin/bluefin
      generate_sbom_inline: true
      project_name: Bluefin
      badge_label: Stable
      accent_color: "#0ea5e9"
      cert_identity_regexp: >-
        ^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/
      notable_packages: >-
        [
          {"sbom_name": "kernel",          "label": "Kernel"},
          {"sbom_name": "gnome-shell",      "label": "GNOME"},
          {"sbom_name": "mesa-filesystem",  "label": "Mesa"},
          {"sbom_name": "podman",           "label": "Podman"},
          {"sbom_name": "nvidia-driver",    "label": "Nvidia"},
          {"sbom_name": "bootc",            "label": "bootc"}
        ]
      docs_url: https://docs.projectbluefin.io/changelogs
    secrets: inherit
