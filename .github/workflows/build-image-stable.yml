name: Stable Images
on:
  push:
    branches:
      - stable
    paths-ignore:
      - ".github/workflows/*validate*.yml"
      - "**.md"
      - "system_files/shared/etc/bazaar/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-image-stable:
    name: Build Stable Images
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'stable'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
 #    kernel_pin: 6.17.12-300.fc43.x86_64 ## Pin to 6.17 for ZFS compatibility
     stream_name: stable
     # FIXME: enable when ublue-os/akmods has ARM builds
     # architecture: '["aarch64","x86_64"]'
     architecture: '["x86_64"]'

  generate-release:
    name: Generate Release
    needs: [build-image-stable]
    permissions:
      contents: write
      actions: read
    secrets: inherit
    uses: ./.github/workflows/generate-release.yml
    with:
      stream_name: '["stable"]'
